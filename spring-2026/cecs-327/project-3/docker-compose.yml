services:
  bootstrap:
    build:
      context: .
      dockerfile: bootstrap.Dockerfile
    container_name: bootstrap
    ports:
      - "5000:5000"
    environment:
      PYTHONUNBUFFERED: 1 # print output immediately

  node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-1
    environment:
      PEER_ADDRESS: http://node-1:5000
      PYTHONUNBUFFERED: 1 # print output immediately
    ports:
      - "5001:5000"
    depends_on:
      - bootstrap

  node-2:
